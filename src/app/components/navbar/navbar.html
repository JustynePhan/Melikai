<nav class="navbar" [class.hidden]="hidden">
  <!-- Desktop links -->
  <ul class="navbar-links">
    <li><a href="#welcome" onclick="event.preventDefault(); document.getElementById('welcome')?.scrollIntoView({behavior: 'smooth'})">{{ t.saveTheDate }}</a></li>
    <li><a href="#timeline" onclick="event.preventDefault(); document.getElementById('timeline').scrollIntoView({behavior: 'smooth'})">{{ t.timeline }}</a></li>
    <li><a href="#details" onclick="event.preventDefault(); document.getElementById('details').scrollIntoView({behavior: 'smooth'})">{{ t.details }}</a></li>
    <li><a href="#rsvp" onclick="event.preventDefault(); document.getElementById('rsvp').scrollIntoView({behavior: 'smooth'})">{{ t.rsvp }}</a></li>
  </ul>
  <select class="language-toggle" [value]="languageService.language" (change)="languageService.language = $any($event.target).value">
    <option value="en">English</option>
    <option value="fr">Français</option>
    <option value="zh">中文</option>
  </select>

  <!-- Hamburger button (mobile only) -->
  <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<!-- Mobile menu overlay -->
<div class="mobile-menu" [class.open]="menuOpen" (click)="closeMenu()">
  <div class="mobile-menu-inner" (click)="$event.stopPropagation()">
    <ul class="mobile-links">
      <li><a href="#welcome" (click)="closeMenu()" onclick="event.preventDefault(); document.getElementById('welcome')?.scrollIntoView({behavior: 'smooth'})">{{ t.saveTheDate }}</a></li>
      <li><a href="#timeline" (click)="closeMenu()" onclick="event.preventDefault(); document.getElementById('timeline').scrollIntoView({behavior: 'smooth'})">{{ t.timeline }}</a></li>
      <li><a href="#details" (click)="closeMenu()" onclick="event.preventDefault(); document.getElementById('details').scrollIntoView({behavior: 'smooth'})">{{ t.details }}</a></li>
      <li><a href="#rsvp" (click)="closeMenu()" onclick="event.preventDefault(); document.getElementById('rsvp').scrollIntoView({behavior: 'smooth'})">{{ t.rsvp }}</a></li>
    </ul>
    <select class="mobile-lang-toggle" [value]="languageService.language" (change)="languageService.language = $any($event.target).value">
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="zh">中文</option>
    </select>
  </div>
</div>
